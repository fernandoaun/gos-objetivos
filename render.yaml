# Render — PostgreSQL obligatorio en producción
# Secretos (GOS_ADMIN_PASSWORD, GOS_IMPORT_SECRET): configurar en el dashboard
# de Render → Environment, o dejar generateValue: true en el primer deploy.

databases:
  - name: gos-objetivos-db
    databaseName: gos_objetivos
    user: gos_objetivos
    plan: free

services:
  - type: web
    name: gos-objetivos
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/render_start.py && gunicorn --bind 0.0.0.0:$PORT --timeout 120 wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: GOS_ADMIN_EMAIL
        value: admin@demo.local
      - key: GOS_ADMIN_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gos-objetivos-db
          property: connectionString
      - key: GOS_AUTO_LOGIN
        value: "false"
      - key: GOS_IMPORT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.8
