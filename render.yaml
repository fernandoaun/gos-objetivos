# Render — PostgreSQL obligatorio en producción
# En el servicio web "gos-objetivos" → Environment debe existir:
#   DATABASE_URL = (linked to gos-objetivos-db)
# Si falta, Render usa SQLite efímero y los datos no persisten.

databases:
  - name: gos-objetivos-db
    databaseName: gos_objetivos
    user: gos_objetivos
    plan: free

services:
  - type: web
    name: gos-objetivos
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: GOS_ADMIN_EMAIL
        value: admin@demo.local
      - key: GOS_ADMIN_PASSWORD
        value: admin123
      - key: DATABASE_URL
        fromDatabase:
          name: gos-objetivos-db
          property: connectionString
      - key: GOS_AUTO_LOGIN
        value: "false"
      - key: GOS_IMPORT_SECRET
        value: gos-restaurar-datos
      - key: PYTHON_VERSION
        value: 3.12.8
