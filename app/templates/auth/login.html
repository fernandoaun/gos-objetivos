{% extends "base.html" %}
{% block title %}Ingresar — GOS Objetivos{% endblock %}
{% block content %}
<div class="pe-login-card mx-auto">
  <div class="text-center mb-4 pe-login-brand">
    {% include "components/brand_logo.html" %}
    <p class="text-muted mt-3 mb-0 small">Planeamiento Estratégico</p>
  </div>
  <form method="post" class="pe-card p-4">
    <div class="mb-3">
      <label class="form-label" for="email">Usuario (email)</label>
      <input type="email" class="form-control" id="email" name="email" required autofocus
             placeholder="admin@demo.local" autocomplete="username"
             value="{{ request.form.email or '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label" for="password">Contraseña</label>
      <input type="password" class="form-control" id="password" name="password" required
             autocomplete="current-password">
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="remember" name="remember">
      <label class="form-check-label" for="remember">Recordarme</label>
    </div>
    <button type="submit" class="btn btn-primary w-100">Ingresar</button>
  </form>
  <p class="text-center text-muted small mt-3 mb-0">
    Demo: admin@demo.local / admin123
  </p>
</div>
{% endblock %}
