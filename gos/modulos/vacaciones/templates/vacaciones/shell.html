{% extends "base.html" %}
{% block title %}Vacaciones — GOS{% endblock %}
{% block page_title %}{% if view == 'importar' %}Importar datos{% else %}Vacaciones adeudadas{% endif %}{% endblock %}
{% block extra_css %}
<style>
  .pe-content.vac-shell {
    padding: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .vac-frame {
    flex: 1;
    border: 0;
    width: 100%;
    min-height: calc(100vh - 120px);
    background: var(--pe-bg);
  }
</style>
{% endblock %}
{% block content %}
<div class="vac-shell w-100">
  <iframe class="vac-frame" src="{{ url_for('vacaciones_main.app', view=view) }}" title="Vacaciones"></iframe>
</div>
{% endblock %}
