{% extends "base.html" %}
{% block page_title %}Cambiar contraseña{% endblock %}
{% block title %}Cambiar contraseña — GOS{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="mb-4">
      <h1 class="h3 mb-1">Cambiar contraseña</h1>
      <p class="text-muted mb-0">Actualizá tu contraseña de acceso a GOS.</p>
    </div>
    <div class="pe-card p-4">
      <form method="post">
        <div class="mb-3">
          <label class="form-label" for="actual">Contraseña actual</label>
          <input type="password" class="form-control form-control-sm" id="actual" name="actual" required
                 autocomplete="current-password">
        </div>
        <div class="mb-3">
          <label class="form-label" for="nueva">Nueva contraseña</label>
          <input type="password" class="form-control form-control-sm" id="nueva" name="nueva" required
                 minlength="6" autocomplete="new-password">
          <div class="form-text">Mínimo 6 caracteres.</div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="confirmacion">Confirmar nueva contraseña</label>
          <input type="password" class="form-control form-control-sm" id="confirmacion" name="confirmacion" required
                 minlength="6" autocomplete="new-password">
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary btn-sm">Guardar contraseña</button>
          <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary btn-sm">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
